name: CI/CD Tests OWASP

on:
  push:
    branches: [ main, develop, Jorge1 ]  # ← Incluye tu rama
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt pytest pytest-cov requests flask
    
    - name: Run Tests
      run: |
        pytest test/ -v --cov=app --cov-report=xml --tb=no || pytest test/ -v  # test/ no tests/
    
    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
      if: success()

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Bandit security scan
      uses: pre-commit/action@v3.0.1
      with:
        extra_args: bandit -r . --format json
