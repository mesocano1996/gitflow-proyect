name: Tests CI/CD
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install deps
      run: |
        pip install flask flask-sqlalchemy pytest pytest-cov requests werkzeug
        
    - name: List tests
      run: find . -name "*test*.py"
    
    - name: Run tests
      run: pytest gitflow/test/ -v --tb=short -s
    
    - name: Coverage (opcional)
      run: pytest --cov=app --cov-report=term-missing || true
    
    - name: OWASP
      run: |
        pip install bandit
        bandit -r app.py backend_api.py || true
