name: CI/CD 4 Pytests OWASP

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install flask pytest pytest-cov
    
    - name: Run 4 pytests
      run: pytest test/ -v --tb=no
      
    - name: List tests passed
      if: success()
      run: |
        pytest test/ --collect-only -q | grep test_ | wc -l
        echo "✅ 4 pytests ejecutados!"
