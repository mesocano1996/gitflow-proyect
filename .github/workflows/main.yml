name: CI/CD OWASP Final

on: [push, pull_request]  # ← CORRE EN TODAS las ramas

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Check Python syntax
      run: |
        python3 -c "import sys; print('Python OK')" || true
        find . -name "*.py" -print | head -5 || echo "No Python files"
